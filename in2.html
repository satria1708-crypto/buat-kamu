<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aku Minta Maaf</title>

<style>

body{
    margin:0;
    padding:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:Arial;
    background:linear-gradient(135deg,#ff9ecf,#ffd6ec,#c8f7ff);
}

/* Bubble */
.bubble{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,0.4);
    animation:naik 10s linear infinite;
}

.bubble:nth-child(1){
    width:100px;
    height:100px;
    left:10%;
}

.bubble:nth-child(2){
    width:150px;
    height:150px;
    left:70%;
    animation-duration:13s;
}

.bubble:nth-child(3){
    width:70px;
    height:70px;
    left:40%;
    animation-duration:8s;
}

@keyframes naik{
    from{
        transform:translateY(100vh);
    }

    to{
        transform:translateY(-120vh);
    }
}

.container{
    position:relative;
    z-index:2;
    background:white;
    padding:40px;
    border-radius:30px;
    text-align:center;
    width:400px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    animation:muncul 1s ease;
}

@keyframes muncul{
    from{
        opacity:0;
        transform:scale(0.5);
    }

    to{
        opacity:1;
        transform:scale(1);
    }
}

h1{
    color:#ff4d88;
    font-size:40px;
    animation:love 1s infinite;
}

@keyframes love{
    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.1);
    }

    100%{
        transform:scale(1);
    }
}

p{
    color:#666;
    margin-top:10px;
    font-size:18px;
}

button{
    margin-top:25px;
    padding:15px 30px;
    border:none;
    border-radius:15px;
    background:linear-gradient(90deg,#ff4d88,#ff7eb3);
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
}

.heart{
    font-size:70px;
    animation:goyang 2s infinite;
}

@keyframes goyang{
    0%{
        transform:rotate(0deg);
    }

    25%{
        transform:rotate(5deg);
    }

    50%{
        transform:rotate(0deg);
    }

    75%{
        transform:rotate(-5deg);
    }

    100%{
        transform:rotate(0deg);
    }
}

</style>
</head>
<body>

<div class="bubble"></div>
<div class="bubble"></div>
<div class="bubble"></div>

<div class="container">

    <div class="heart">💖</div>

    <h1>Aku Minta Maaf</h1>

    <p>
        Ada sesuatu yang ingin aku sampaikan... 🥺
    </p>

    <button onclick="masukHalaman()">
        Buka Pesan 💌
    </button>

</div>

<script>

function masukHalaman(){

    window.location.href = "in2.html";

}

</script>

</body>
</html>
